name: Feature request
description: Suggest an improvement or new MCP tool
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Search [existing issues](https://github.com/redanthrax/halopsa-mcp/issues) first.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the server does not support today?
      placeholder: I need to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should the MCP server expose this (tool name, API endpoint, etc.)?
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment mode
      options:
        - Desktop stdio (local MCP host)
        - Docker (self-hosted HTTP)
        - Kubernetes / Helm
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked HaloPSA API docs / permissions for this capability
          required: false
        - label: This is not a security vulnerability (use Security Advisories instead)
          required: true
