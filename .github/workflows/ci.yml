name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: |
          dotnet restore HaloPsaMcp.csproj --locked-mode
          dotnet restore tests/HaloPsaMcp.Tests/HaloPsaMcp.Tests.csproj --locked-mode

      - name: Build
        run: |
          dotnet build HaloPsaMcp.csproj --no-restore --configuration Release
          dotnet build tests/HaloPsaMcp.Tests/HaloPsaMcp.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/HaloPsaMcp.Tests/HaloPsaMcp.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Vulnerable package scan
        run: |
          set -euo pipefail
          OUT=$(dotnet list HaloPsaMcp.csproj package --vulnerable --include-transitive 2>&1 || true)
          echo "$OUT"
          if echo "$OUT" | grep -E "^\s*>\s" >/dev/null; then
            echo "::error::Vulnerable NuGet packages detected"
            exit 1
          fi

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for scan
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: halopsa-mcp:ci-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: halopsa-mcp:ci-scan
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
