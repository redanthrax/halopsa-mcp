name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: |
          dotnet restore HaloPsaMcp.csproj --locked-mode
          dotnet restore tests/HaloPsaMcp.Tests/HaloPsaMcp.Tests.csproj --locked-mode

      - name: Build
        run: |
          dotnet build HaloPsaMcp.csproj --no-restore --configuration Release
          dotnet build tests/HaloPsaMcp.Tests/HaloPsaMcp.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/HaloPsaMcp.Tests/HaloPsaMcp.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Vulnerable package scan
        run: |
          set -euo pipefail
          OUT=$(dotnet list HaloPsaMcp.csproj package --vulnerable --include-transitive 2>&1 || true)
          echo "$OUT"
          if echo "$OUT" | grep -E "^\s*>\s" >/dev/null; then
            echo "::error::Vulnerable NuGet packages detected"
            exit 1
          fi

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build image for scan
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: halopsa-mcp:ci-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: halopsa-mcp:ci-scan
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          format: table
          output: trivy-results.txt

      - name: Publish Trivy results to summary
        if: always()
        run: |
          {
            echo "### Docker image scan (Trivy)"
            echo ""
            if [[ -s trivy-results.txt ]]; then
              echo '```'
              cat trivy-results.txt
              echo '```'
            else
              echo "_No results file — see job logs._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on vulnerabilities
        if: steps.trivy.outcome == 'failure'
        run: |
          echo "::error::Trivy found CRITICAL or HIGH vulnerabilities (see job summary)"
          exit 1
