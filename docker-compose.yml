services:
  halopsa-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: halopsa-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"  # HTTP/OAuth server port
      - "8000:8000"  # MCP server port
    environment:
      - HALOPSA_URL=${HALOPSA_URL}
      - HALOPSA_CLIENT_ID=${HALOPSA_CLIENT_ID}
      - HALOPSA_TOKEN_STORE=/app/data/tokens.json
      - MCP_PORT=8000
      - HTTP_PORT=3000
      - AUTH_BASE_URL=${AUTH_BASE_URL:-http://localhost:3000}
      # Optional for client_credentials fallback mode
      - HALOPSA_CLIENT_SECRET=${HALOPSA_CLIENT_SECRET:-}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
