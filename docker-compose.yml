services:
  halopsa-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: redanthrax/halopsa-mcp:local
    container_name: halopsa-mcp
    restart: unless-stopped
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "3000:3000"
    environment:
      HALOPSA_URL: ${HALOPSA_URL}
      HALOPSA_CLIENT_ID: ${HALOPSA_CLIENT_ID}
      HALOPSA_CLIENT_SECRET: ${HALOPSA_CLIENT_SECRET:-}
      HALOPSA_TOKEN_STORE: /app/data/tokens.json
      HALOPSA_DPKEY_DIR: /app/data/dp-keys
      HTTP_PORT: "3000"
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:3000}
      HALOPSA_PUBLIC_URL: ${HALOPSA_PUBLIC_URL:-}
      # Gate /register (DCR). Required for --http unless MCP_ALLOW_OPEN_DCR=1 (local only).
      MCP_DCR_INITIAL_ACCESS_TOKEN: ${MCP_DCR_INITIAL_ACCESS_TOKEN:-}
      MCP_ALLOW_OPEN_DCR: ${MCP_ALLOW_OPEN_DCR:-1}
      # Set to "1" only for trusted in-cluster scrape targets.
      MCP_READY_VERBOSE: ${MCP_READY_VERBOSE:-0}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - ./data:/app/data
