apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "halopsa-mcp.fullname" . }}
  labels:
    {{- include "halopsa-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "halopsa-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "halopsa-mcp.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "halopsa-mcp.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default false }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: {{ include "halopsa-mcp.image" . | quote }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.ports.http }}
          protocol: TCP
        env:
        - name: HALOPSA_URL
          value: {{ .Values.halopsa.url | quote }}
        - name: HALOPSA_CLIENT_ID
          value: {{ .Values.halopsa.clientId | quote }}
        - name: AUTH_BASE_URL
          value: {{ .Values.halopsa.authBaseUrl | quote }}
        {{- if .Values.halopsa.publicBaseUrl }}
        - name: HALOPSA_PUBLIC_URL
          value: {{ .Values.halopsa.publicBaseUrl | quote }}
        {{- end }}
        - name: HTTP_PORT
          value: {{ .Values.ports.http | quote }}
        - name: HALOPSA_TOKEN_STORE_BACKEND
          value: {{ .Values.halopsa.tokenStore.backend | quote }}
        - name: HALOPSA_TOKEN_STORE
          value: {{ .Values.halopsa.tokenStore.path | quote }}
        {{- if eq .Values.halopsa.tokenStore.backend "redis" }}
        {{- if .Values.halopsa.redis.existingSecret }}
        - name: HALOPSA_REDIS_CONNECTION
          valueFrom:
            secretKeyRef:
              name: {{ .Values.halopsa.redis.existingSecret | quote }}
              key: {{ .Values.halopsa.redis.existingSecretKey | quote }}
        {{- else if or .Values.halopsa.redis.connection .Values.halopsa.redisConnection }}
        - name: HALOPSA_REDIS_CONNECTION
          valueFrom:
            secretKeyRef:
              name: {{ include "halopsa-mcp.fullname" . }}-secret
              key: halopsa_redis_connection
        {{- end }}
        {{- end }}
        - name: HALOPSA_DPKEY_DIR
          value: {{ .Values.halopsa.dpKeyDir | quote }}
        - name: HALOPSA_REDIRECT_URI
          value: "{{ .Values.halopsa.authBaseUrl }}/callback"
        - name: LOG_FORMAT
          value: {{ .Values.logFormat | quote }}
        - name: MCP_READY_VERBOSE
          value: {{ .Values.readyVerbose | ternary "1" "0" | quote }}
        {{- if .Values.cors.allowedOrigins }}
        - name: MCP_CORS_ALLOWED_ORIGINS
          value: {{ .Values.cors.allowedOrigins | quote }}
        {{- end }}
        {{- if .Values.halopsa.clientSecret }}
        - name: HALOPSA_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "halopsa-mcp.fullname" . }}-secret
              key: halopsa_client_secret
        {{- end }}
        {{- if .Values.dcrInitialAccessToken }}
        - name: MCP_DCR_INITIAL_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "halopsa-mcp.fullname" . }}-secret
              key: mcp_dcr_initial_access_token
        {{- end }}
        {{- if .Values.dcrAllowOpen }}
        - name: MCP_ALLOW_OPEN_DCR
          value: "1"
        {{- end }}
        volumeMounts:
        - name: token-storage
          mountPath: /app/data
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
      volumes:
      - name: token-storage
        {{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "halopsa-mcp.fullname" . }}-pvc
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: tmp
        emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
