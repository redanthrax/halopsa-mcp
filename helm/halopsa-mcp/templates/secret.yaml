{{- if or .Values.halopsa.clientSecret .Values.dcrInitialAccessToken .Values.halopsa.redis.connection .Values.halopsa.redisConnection }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "halopsa-mcp.fullname" . }}-secret
  labels:
    {{- include "halopsa-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.halopsa.clientSecret }}
  halopsa_client_secret: {{ .Values.halopsa.clientSecret | quote }}
  {{- end }}
  {{- if .Values.dcrInitialAccessToken }}
  mcp_dcr_initial_access_token: {{ .Values.dcrInitialAccessToken | quote }}
  {{- end }}
  {{- if and (not .Values.halopsa.redis.existingSecret) (or .Values.halopsa.redis.connection .Values.halopsa.redisConnection) }}
  halopsa_redis_connection: {{ default .Values.halopsa.redisConnection .Values.halopsa.redis.connection | quote }}
  {{- end }}
{{- end }}
