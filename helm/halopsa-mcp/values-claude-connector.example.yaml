# Example Helm overlay for Claude.ai organization connector deployments.
#
# Usage:
#   helm upgrade --install halopsa-mcp helm/halopsa-mcp \
#     -f helm/halopsa-mcp/values.yaml \
#     -f helm/halopsa-mcp/values-claude-connector.example.yaml \
#     --set halopsa.url=https://your-tenant.halopsa.com \
#     --set halopsa.clientId=your-halopsa-client-id \
#     --set halopsa.authBaseUrl=https://halopsa-mcp.example.com \
#     --set halopsa.publicBaseUrl=https://halopsa-mcp.example.com \
#     --set halopsa.redis.connection='host:6379,password=...,ssl=true' \
#     --set ingress.hosts[0].host=halopsa-mcp.example.com
#
# HaloPSA app registration must include:
#   Login Redirect URL: https://halopsa-mcp.example.com/callback
#   Authentication Method: Authorisation Code (Native Application)
#   Allow Agent Logins: enabled

replicaCount: 2

halopsa:
  tokenStore:
    backend: redis
  redis:
    connection: ""  # set via --set or existingSecret

# Stateless Streamable HTTP — each POST /mcp is independent (no Mcp-Session-Id pod stickiness).
# Auto-enabled when backend=redis; set explicitly for clarity.
mcp:
  httpStateless: "1"

ingress:
  enabled: true
  className: nginx
  cors:
    enabled: true
    allowOrigin: "https://claude.ai"
  hosts:
    - host: halopsa-mcp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: halopsa-mcp-tls
  #    hosts:
  #      - halopsa-mcp.example.com

cors:
  allowedOrigins: "https://claude.ai,https://www.claude.ai"

# Open DCR for MCP clients (Claude backend registers via POST /register).
dcrInitialAccessToken: ""
dcrAllowOpen: false

networkPolicy:
  enabled: true

podDisruptionBudget:
  enabled: true
  minAvailable: 1
