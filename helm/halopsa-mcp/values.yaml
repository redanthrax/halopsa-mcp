# Default values for halopsa-mcp
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1  # Increase when tokenStore.backend=redis

image:
  repository: redanthrax/halopsa-mcp
  pullPolicy: IfNotPresent
  # Tag when image.digest is empty (defaults to Chart.AppVersion).
  tag: ""
  # Production: pin immutable image, e.g. sha256:abc123... (from docker inspect or release SBOM).
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automountServiceAccountToken: false
  annotations: {}
    # azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP  # Change to LoadBalancer or NodePort for external access
  port: 3000
  targetPort: 3000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # Stateful MCP only (MCP_HTTP_STATELESS=0): hash by session header so tools/call
    # reaches the pod that handled initialize. Not needed when stateless (default with redis).
    # nginx.ingress.kubernetes.io/upstream-hash-by: "$http_mcp_session_id"
  # Optional nginx ingress CORS (belt-and-suspenders; app handles CORS by default).
  cors:
    enabled: false
    allowOrigin: "https://claude.ai"
  hosts:
    - host: halopsa-mcp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: halopsa-mcp-tls
  #    hosts:
  #      - halopsa-mcp.example.com

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Persistent storage for OAuth tokens
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 1Gi
  storageClass: ""  # Use default storage class if empty
  annotations: {}

# HaloPSA Configuration
halopsa:
  # Your HaloPSA instance URL (e.g., https://your-tenant.halopsa.com)
  url: "https://your-instance.halopsa.com"
  
  # OAuth Client ID from HaloPSA Application Registration
  clientId: "your-client-id"
  
  # Optional: Client Secret (for client_credentials fallback)
  # Leave empty to use OAuth user authentication only
  clientSecret: ""
  
  # External base URL for OAuth callbacks (e.g., https://halopsa-mcp.example.com)
  authBaseUrl: "http://localhost:3000"
  
  # Public base URL for login links (users click this). Defaults to authBaseUrl.
  # Set when externally reachable URL differs from OAuth base (e.g., behind reverse proxy).
  publicBaseUrl: ""
  
  # Token store: file (default) or redis (required for replicaCount > 1)
  tokenStore:
    backend: file
    path: "/app/data/tokens.json"
  # StackExchange.Redis connection string when tokenStore.backend=redis.
  # Prefer redis.connection + this chart's Secret, or redis.existingSecret.
  redisConnection: ""
  redis:
    connection: ""
    existingSecret: ""
    existingSecretKey: halopsa_redis_connection
  # DataProtection keys directory (encrypts tokens.json + clients.json at rest).
  # Lives on the same PVC by default; consider Azure Key Vault wrap for prod.
  dpKeyDir: "/app/data/dp-keys"

# Logging: json (containers) or text (debug).
logFormat: json

# /ready response detail. False = minimal {status} (safe for public probes).
# True = include session counts/dependency info (only enable for trusted scrapers).
readyVerbose: false

# Application ports
ports:
  http: 3000

nodeSelector: {}

tolerations: []

affinity: {}

# NetworkPolicy: default-deny except ingress controller and HaloPSA HTTPS egress.
# Override .ingress / .egress to fully customise.
networkPolicy:
  enabled: true
  ingress: []
  egress: []

# PodDisruptionBudget: only useful when replicaCount > 1.
# Single-replica + RWO PVC is incompatible with PDB.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# MCP Streamable HTTP transport (SDK ModelContextProtocol.AspNetCore).
# Stateless mode (default when tokenStore.backend=redis) avoids Mcp-Session-Id
# pod affinity — required for Claude.ai and other server-to-server callers.
mcp:
  # "" = auto (stateless when redis). "1" = force stateless. "0" = stateful (needs session affinity).
  httpStateless: ""

# CORS for browser MCP clients (Claude.ai org connectors). Comma-separated origins.
cors:
  allowedOrigins: "https://claude.ai"

# Optional Initial Access Token gate for /register (DCR).
# When set, /register requires Authorization: Bearer <this token> unless
# dcrAllowOpen is true (required for Claude.ai org connectors and other MCP clients
# that perform unauthenticated DCR).
dcrInitialAccessToken: ""
# When true, sets MCP_ALLOW_OPEN_DCR=1 so /register accepts unauthenticated DCR
# even if dcrInitialAccessToken is set.
dcrAllowOpen: false
