# Default values for halopsa-mcp
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1  # Keep at 1 for stateful token storage

image:
  repository: redanthrax/halopsa-mcp
  pullPolicy: IfNotPresent
  # Leave empty to fall back to .Chart.AppVersion. Override per-environment.
  # TODO digest-pin: pin via image.digest before AKS prod
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automountServiceAccountToken: false
  annotations: {}
    # azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP  # Change to LoadBalancer or NodePort for external access
  port: 3000
  targetPort: 3000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: halopsa-mcp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: halopsa-mcp-tls
  #    hosts:
  #      - halopsa-mcp.example.com

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Persistent storage for OAuth tokens
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 1Gi
  storageClass: ""  # Use default storage class if empty
  annotations: {}

# HaloPSA Configuration
halopsa:
  # Your HaloPSA instance URL (e.g., https://your-tenant.halopsa.com)
  url: "https://your-instance.halopsa.com"
  
  # OAuth Client ID from HaloPSA Application Registration
  clientId: "your-client-id"
  
  # Optional: Client Secret (for client_credentials fallback)
  # Leave empty to use OAuth user authentication only
  clientSecret: ""
  
  # External base URL for OAuth callbacks (e.g., https://halopsa-mcp.example.com)
  authBaseUrl: "http://localhost:3000"
  
  # Token storage path (inside container)
  tokenStorePath: "/app/data/tokens.json"
  # DataProtection keys directory (encrypts tokens.json + clients.json at rest).
  # Lives on the same PVC by default; consider Azure Key Vault wrap for prod.
  dpKeyDir: "/app/data/dp-keys"

# Logging: json (containers) or text (debug).
logFormat: json

# /ready response detail. False = minimal {status} (safe for public probes).
# True = include session counts/dependency info (only enable for trusted scrapers).
readyVerbose: false

# Application ports
ports:
  http: 3000

nodeSelector: {}

tolerations: []

affinity: {}

# NetworkPolicy: default-deny except ingress controller and HaloPSA HTTPS egress.
# Override .ingress / .egress to fully customise.
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# PodDisruptionBudget: only useful when replicaCount > 1.
# Single-replica + RWO PVC is incompatible with PDB.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Optional Initial Access Token gate for /register (DCR).
# When set, /register requires Authorization: Bearer <this token>.
dcrInitialAccessToken: ""
